apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-website
  labels:
    app: corporate-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corporate-website
  template:
    metadata:
      labels:
        app: corporate-website
    spec:
      containers:
        - name: corporate-website
          image: corporate-website:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
